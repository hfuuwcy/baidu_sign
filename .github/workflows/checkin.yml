name: BaiduWP Checkin

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run web or app entrypoint"
        required: true
        default: web
        type: choice
        options:
          - web
          - app
  schedule:
    # 07:20 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "20 23 * * *"

permissions:
  contents: read

concurrency:
  group: baiduwp-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      BAIDUWP_CONFIG: ${{ secrets.BAIDUWP_CONFIG }}
      BAIDUWP: ${{ secrets.BAIDUWP }}
      BAIDUWP_COOKIE: ${{ secrets.BAIDUWP_COOKIE }}
      BAIDUWP_APP_ENABLED: ${{ vars.BAIDUWP_APP_ENABLED || secrets.BAIDUWP_APP_ENABLED }}
      BAIDUWP_APP_Z: ${{ secrets.BAIDUWP_APP_Z }}
      BAIDUWP_APP_CUID: ${{ secrets.BAIDUWP_APP_CUID }}
      BAIDUWP_APP_DEVUID: ${{ secrets.BAIDUWP_APP_DEVUID }}
      BAIDUWP_APP_CHANNEL: ${{ vars.BAIDUWP_APP_CHANNEL || secrets.BAIDUWP_APP_CHANNEL }}
      BAIDUWP_APP_VERSION: ${{ vars.BAIDUWP_APP_VERSION || secrets.BAIDUWP_APP_VERSION }}
      BAIDUWP_APP_VERSIONCODE: ${{ vars.BAIDUWP_APP_VERSIONCODE || secrets.BAIDUWP_APP_VERSIONCODE }}
      BAIDUWP_APP_CLIENTTYPE: ${{ vars.BAIDUWP_APP_CLIENTTYPE || secrets.BAIDUWP_APP_CLIENTTYPE }}
      BAIDUWP_APP_THEMEINFO: ${{ vars.BAIDUWP_APP_THEMEINFO || secrets.BAIDUWP_APP_THEMEINFO }}
      BAIDUWP_APP_APP: ${{ vars.BAIDUWP_APP_APP || secrets.BAIDUWP_APP_APP }}
      BAIDUWP_APP_RCHANNEL: ${{ secrets.BAIDUWP_APP_RCHANNEL }}
      BAIDUWP_APP_USER_AGENT: ${{ secrets.BAIDUWP_APP_USER_AGENT }}
      BAIDUWP_APP_OFFLINEPACKAGE: ${{ secrets.BAIDUWP_APP_OFFLINEPACKAGE }}
      BAIDUWP_APP_TASKS: ${{ vars.BAIDUWP_APP_TASKS || secrets.BAIDUWP_APP_TASKS }}
      BAIDUWP_APP_TASKSCORE_TASKS: ${{ vars.BAIDUWP_APP_TASKSCORE_TASKS || secrets.BAIDUWP_APP_TASKSCORE_TASKS }}
      BAIDUWP_APP_COIN_SIGN_TASK_ID: ${{ vars.BAIDUWP_APP_COIN_SIGN_TASK_ID || secrets.BAIDUWP_APP_COIN_SIGN_TASK_ID }}
      BAIDUWP_APP_COIN_SIGN_TASK_FROM: ${{ vars.BAIDUWP_APP_COIN_SIGN_TASK_FROM || secrets.BAIDUWP_APP_COIN_SIGN_TASK_FROM }}
      BAIDUWP_APP_IS_GROWTH: ${{ vars.BAIDUWP_APP_IS_GROWTH || secrets.BAIDUWP_APP_IS_GROWTH }}
      BAIDUWP_APP_QUESTION_TASK_ID: ${{ vars.BAIDUWP_APP_QUESTION_TASK_ID || secrets.BAIDUWP_APP_QUESTION_TASK_ID }}
      BAIDUWP_APP_QUESTION_TASK_FROM: ${{ vars.BAIDUWP_APP_QUESTION_TASK_FROM || secrets.BAIDUWP_APP_QUESTION_TASK_FROM }}
      BAIDUWP_APP_UK: ${{ secrets.BAIDUWP_APP_UK }}
      BAIDUWP_APP_TOKEN: ${{ secrets.BAIDUWP_APP_TOKEN }}
      BAIDUWP_APP_AD_WATCH_ENABLED: ${{ vars.BAIDUWP_APP_AD_WATCH_ENABLED || secrets.BAIDUWP_APP_AD_WATCH_ENABLED }}
      BAIDUWP_APP_AD_WATCH_TASK_ID: ${{ vars.BAIDUWP_APP_AD_WATCH_TASK_ID || secrets.BAIDUWP_APP_AD_WATCH_TASK_ID }}
      BAIDUWP_APP_AD_WATCH_TASK_FROM: ${{ vars.BAIDUWP_APP_AD_WATCH_TASK_FROM || secrets.BAIDUWP_APP_AD_WATCH_TASK_FROM }}
      BAIDUWP_APP_AD_WATCH_DELAY_SECONDS: ${{ vars.BAIDUWP_APP_AD_WATCH_DELAY_SECONDS || secrets.BAIDUWP_APP_AD_WATCH_DELAY_SECONDS }}
      BAIDUWP_EMAIL_ENABLED: ${{ vars.BAIDUWP_EMAIL_ENABLED || secrets.BAIDUWP_EMAIL_ENABLED }}
      BAIDUWP_EMAIL_SMTP_HOST: ${{ vars.BAIDUWP_EMAIL_SMTP_HOST || secrets.BAIDUWP_EMAIL_SMTP_HOST }}
      BAIDUWP_EMAIL_SMTP_PORT: ${{ vars.BAIDUWP_EMAIL_SMTP_PORT || secrets.BAIDUWP_EMAIL_SMTP_PORT }}
      BAIDUWP_EMAIL_SMTP_USER: ${{ secrets.BAIDUWP_EMAIL_SMTP_USER }}
      BAIDUWP_EMAIL_SMTP_PASSWORD: ${{ secrets.BAIDUWP_EMAIL_SMTP_PASSWORD }}
      BAIDUWP_EMAIL_SMTP_PASSWORD_ENV: ${{ secrets.BAIDUWP_EMAIL_SMTP_PASSWORD_ENV }}
      BAIDUWP_EMAIL_FROM_ADDR: ${{ secrets.BAIDUWP_EMAIL_FROM_ADDR }}
      BAIDUWP_EMAIL_TO_ADDRS: ${{ secrets.BAIDUWP_EMAIL_TO_ADDRS }}
      BAIDUWP_EMAIL_USE_SSL: ${{ vars.BAIDUWP_EMAIL_USE_SSL || secrets.BAIDUWP_EMAIL_USE_SSL }}
      BAIDUWP_EMAIL_USE_TLS: ${{ vars.BAIDUWP_EMAIL_USE_TLS || secrets.BAIDUWP_EMAIL_USE_TLS }}
      BAIDUWP_EMAIL_SUBJECT: ${{ vars.BAIDUWP_EMAIL_SUBJECT || secrets.BAIDUWP_EMAIL_SUBJECT }}
      CHECKIN_MODE: ${{ vars.CHECKIN_MODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secret configuration
        run: |
          if [ -z "$BAIDUWP_CONFIG" ] && [ -z "$BAIDUWP" ] && [ -z "$BAIDUWP_COOKIE" ]; then
            echo "Missing secret: set BAIDUWP_CONFIG for full JSON config, BAIDUWP for cookie/account JSON, or BAIDUWP_COOKIE for split secrets."
            exit 1
          fi

      - name: Run checkin
        run: |
          mode="${{ github.event.inputs.mode }}"
          if [ -z "$mode" ]; then
            mode="${CHECKIN_MODE:-web}"
          fi

          case "$mode" in
            web)
              python -m baiduwp_checkin --no-random-delay
              ;;
            app)
              python baiduwp_checkin/app.py
              ;;
            *)
              echo "Unsupported CHECKIN_MODE: $mode"
              exit 1
              ;;
          esac
