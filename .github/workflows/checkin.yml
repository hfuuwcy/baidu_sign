name: BaiduWP Web Checkin

on:
  workflow_dispatch:
  schedule:
    # 07:20 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "20 23 * * *"

permissions:
  contents: read

concurrency:
  group: baiduwp-web-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      BAIDUWP_CONFIG: ${{ secrets.BAIDUWP_CONFIG }}
      BAIDUWP: ${{ secrets.BAIDUWP }}
      BAIDUWP_EMAIL_CONFIG: ${{ secrets.BAIDUWP_EMAIL_CONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secret configuration
        run: |
          if [ -z "$BAIDUWP_CONFIG" ] && [ -z "$BAIDUWP" ]; then
            echo "Missing secret: set BAIDUWP_CONFIG for account JSON, or BAIDUWP for cookie/account JSON."
            exit 1
          fi

      - name: Run web checkin
        run: python -m baiduwp_checkin --no-random-delay
