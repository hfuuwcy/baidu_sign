name: BaiduWP App Checkin

on:
  workflow_dispatch:
  schedule:
    # 10:40 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "40 2 * * *"

permissions:
  contents: read

concurrency:
  group: baiduwp-app-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      BAIDUWP_CONFIG: ${{ secrets.BAIDUWP_CONFIG }}
      BAIDUWP: ${{ secrets.BAIDUWP }}
      BAIDUWP_EMAIL_CONFIG: ${{ secrets.BAIDUWP_EMAIL_CONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secret configuration
        run: |
          if [ -z "$BAIDUWP_CONFIG" ] && [ -z "$BAIDUWP" ]; then
            echo "Missing secret: set BAIDUWP_CONFIG for account JSON, or BAIDUWP for cookie/account JSON."
            exit 1
          fi

      - name: Run app checkin
        shell: bash
        env:
          RETRY_KEYWORDS: "App 端签到请求失败|App 端签到列表查询失败|App 每日题目获取失败|App 每日答题提交失败|App 会员信息查询失败|App 端执行失败|Read timed out|Connection"
        run: |
          run_checkin() {
            python baiduwp_checkin/app.py 2>&1 | tee app-checkin-output.log
            return "${PIPESTATUS[0]}"
          }

          set +e
          run_checkin
          status="$?"

          if [ "$status" -ne 0 ] || grep -Eq "$RETRY_KEYWORDS" app-checkin-output.log; then
            echo "Detected failed status or retry keyword, retrying once after 30 seconds..."
            sleep 30

            run_checkin
            retry_status="$?"

            if [ "$retry_status" -ne 0 ] || grep -Eq "$RETRY_KEYWORDS" app-checkin-output.log; then
              echo "Retry still failed or matched retry keyword."
              exit 1
            fi
          fi
